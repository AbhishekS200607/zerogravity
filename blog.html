<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | ZeroGravity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --text: #121926; --muted: #4B5563; --accent: #baff26; --accent-strong: #aef70c; --shadow: 0 24px 80px rgba(103, 119, 145, 0.18); --radius-pill: 999px; --container: 1540px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; padding: 6px 0 0; font-family: "Inter", sans-serif; color: var(--text); background: radial-gradient(circle at top center, rgba(255, 255, 255, 0.98), rgba(238, 241, 245, 0.88) 38%, rgba(229, 234, 240, 0.94) 100%); }
        .shell { width: min(var(--container), calc(100% - 12px)); margin: 0 auto; padding: 16px 0 0; border-radius: 22px; background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.54)); box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82), 0 18px 48px rgba(126, 140, 159, 0.12); }
        .topbar { display: flex; align-items: center; justify-content: space-between; gap: 28px; padding: 0 28px 16px 36px; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .brand-mark { width: 46px; height: 34px; border-radius: 14px; overflow: hidden; background: #fff; box-shadow: 0 10px 24px rgba(17, 24, 39, 0.12); }
        .brand-mark img { width: 100%; height: 100%; object-fit: cover; }
        .brand-name { font-size: 24px; font-weight: 800; letter-spacing: -0.04em; }
        .nav { display: flex; align-items: center; gap: 30px; }
        .nav a { font-size: 15px; font-weight: 500; color: #192230; text-decoration: none; }
        .content-area { padding: 100px 50px; text-align: center; }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; text-align: left; }
        .blog-post { background: #fff; border-radius: 30px; overflow: hidden; box-shadow: var(--shadow); }
        .blog-post img { width: 100%; height: 250px; object-fit: cover; }
        .blog-post-content { padding: 30px; }
        footer { padding: 50px; text-align: center; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="brand" href="indexnew.html">
                <span class="brand-mark"><img src="logo.webp"></span>
                <span class="brand-name">ZeroGravity</span>
            </a>
            <nav class="nav">
                <a href="indexnew.html">Home</a>
                <a href="services.html">Services</a>
                <a href="gallery.html">Gallery</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </header>
        <main class="content-area">
            <h1 style="font-size: 60px; font-weight: 800; margin-bottom: 60px;">Latest Updates</h1>
            <div class="blog-grid">
                <div class="blog-post">
                    <img src="https://images.unsplash.com/photo-1607860108855-64acf2078ed9?auto=format&fit=crop&w=800">
                    <div class="blog-post-content">
                        <h3>Why Ceramic Coating is worth it</h3>
                        <p style="color: var(--muted); margin-top: 15px;">Learn the long-term benefits of protecting your car's paint.</p>
                    </div>
                </div>
            </div>
        </main>
        <footer><p>&copy; 2024 ZeroGravity. All Rights Reserved.</p></footer>
    </div>
</body>
</html>
